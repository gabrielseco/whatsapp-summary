name: Daily WhatsApp Summary

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 11 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Stream logs (background)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl logs --app whatsapp-summary &

      - name: Trigger summary
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          curl --fail --max-time 600 -s -X POST \
            https://whatsapp-summary.fly.dev/summary \
            -H "Authorization: Bearer ${{ secrets.API_SECRET }}"
