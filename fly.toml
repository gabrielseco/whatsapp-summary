app = "whatsapp-summary"
primary_region = "cdg"

[build]

[env]
  TZ = "Europe/Madrid"

# Session data persists between runs
[[mounts]]
  source = "whatsapp_session"
  destination = "/app/.wa_auth"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[restart]]
  policy = "on-failure"
  max_retries = 0

[[vm]]
  memory = "1gb"
  cpus = 1
  cpu_kind = "shared"
